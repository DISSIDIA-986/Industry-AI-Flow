name: Workflow Release Gate

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres 16 with pgvector preinstalled — matches the
    # docker-compose-postgres.yml image used in local dev. Without this
    # service, test-prompt-baseline-gate's asyncpg.connect() was failing
    # with "Connect call failed ('127.0.0.1', 5432)" and red-ing CI on
    # every push for the past week.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_workflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workflow
      # Backend config asserts these are set (no fallback by design — see
      # backend/config.py + CLAUDE.md). Without them, several tests fail at
      # COLLECTION before any assertion runs. Values are CI-only dummies;
      # the real demo uses a separate .env.
      DEMO_USER_PASSWORD: ci-dummy-password-not-real
      AUTH_JWT_SECRET: ci-dummy-jwt-secret-not-real-32-bytes-min
      REQUIRE_USER_AUTH: "false"
      REQUIRE_API_KEY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/release-gate.txt

      - name: Initialize database schema
        # `python -m` form ensures repo root is on sys.path so
        # `from backend.config import settings` resolves. Running the
        # file directly (`python backend/init_database.py`) doesn't
        # add CWD to sys.path in Python 3.11+ and fails with
        # ModuleNotFoundError: No module named 'backend'.
        run: |
          python -m backend.init_database

      - name: Seed prompt baseline
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python scripts/migration/seed_prompt_baseline.py --pretty

      - name: Run release gate
        run: |
          make test-release-gate

  frontend-layout-nav-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # The live-API half of this gate boots a real backend; backend/config.py
    # asserts these are set (no fallback by design). Without them the backend
    # crashes on startup ("DEMO_USER_PASSWORD ... required but not set") and the
    # health probe times out. Mirrors the release-gate job's CI-only dummies.
    # REQUIRE_USER_AUTH=false so the backend serves without a live auth DB.
    env:
      DEMO_USER_PASSWORD: ci-dummy-password-not-real
      AUTH_JWT_SECRET: ci-dummy-jwt-secret-not-real-32-bytes-min
      REQUIRE_USER_AUTH: "false"
      REQUIRE_API_KEY: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps for live API regression
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/release-gate.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend layout/nav regression gate
        run: |
          make test-frontend-layout-nav-gate

      - name: Upload frontend regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-layout-nav-gate-artifacts
          path: |
            frontend/playwright-report
            frontend/playwright-results.json
            frontend/junit-results.xml
            logs/backend-e2e-live.log
          if-no-files-found: warn
