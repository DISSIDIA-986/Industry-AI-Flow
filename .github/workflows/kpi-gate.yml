name: Workflow Release Gate

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Postgres 16 with pgvector preinstalled — matches the
    # docker-compose-postgres.yml image used in local dev. Without this
    # service, test-prompt-baseline-gate's asyncpg.connect() was failing
    # with "Connect call failed ('127.0.0.1', 5432)" and red-ing CI on
    # every push for the past week.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ai_workflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_workflow

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/release-gate.txt

      - name: Initialize database schema
        run: |
          python backend/init_database.py

      - name: Seed prompt baseline
        run: |
          python scripts/migration/seed_prompt_baseline.py --pretty

      - name: Run release gate
        run: |
          make test-release-gate

  frontend-layout-nav-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install backend deps for live API regression
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/release-gate.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run frontend layout/nav regression gate
        run: |
          make test-frontend-layout-nav-gate

      - name: Upload frontend regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-layout-nav-gate-artifacts
          path: |
            frontend/playwright-report
            frontend/playwright-results.json
            frontend/junit-results.xml
            logs/backend-e2e-live.log
          if-no-files-found: warn
