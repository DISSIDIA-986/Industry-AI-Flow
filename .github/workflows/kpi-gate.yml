name: Workflow Release Gate

on:
  pull_request:
    branches:
      - "**"
  push:
    branches:
      - main
      - master

jobs:
  release-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements/release-gate.txt

      - name: Run release gate
        run: |
          make test-release-gate
