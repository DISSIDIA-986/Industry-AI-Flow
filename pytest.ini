[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --strict-config
    --disable-warnings
    --cov=backend
    --cov-report=term-missing
    --cov-report=html
    --cov-fail-under=70
filterwarnings = 
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
markers = 
    unit: unit tests
    integration: integration tests
    e2e: end-to-end tests
    slow: slow tests
    fast: fast tests