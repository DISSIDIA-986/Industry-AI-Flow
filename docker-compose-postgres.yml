version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: industry-ai-postgres
    environment:
      POSTGRES_DB: ai_workflow
      POSTGRES_USER: openclaw
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openclaw"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: